<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Game Playground — Nathan Wong</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ── Design tokens (mirror parent portfolio) ── */
:root {
  --cream:       #f7eee0;
  --cream-2:     #efe2cc;
  --peach:       #f5c89c;
  --terracotta:  #c87533;
  --ember:       #8a3a1a;
  --burgundy:    #4a1d1a;
  --ink:         #1a0f08;
  --muted:       #7a5a3f;
  --terminal-bg: #1a0f08;
  --terminal-fg: #f5e7d4;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --serif: 'Newsreader', Georgia, serif;
}

/* ── Minimal page reset for standalone preview ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: var(--mono);
  background: var(--cream);
  color: var(--ink);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: 0; background: none; }

/* ── Layout helpers (match parent) ── */
.container { max-width: 960px; margin: 0 auto; padding: 0 32px; }
.section { padding: 72px 0; border-top: 1px dashed rgba(28,26,23,0.35); }
.section-inner { }
.section-label {
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.section-heading {
  font-family: var(--serif); font-size: clamp(26px, 4vw, 36px);
  font-weight: 400; letter-spacing: -0.01em; line-height: 1.15;
  margin-bottom: 20px; color: var(--ink);
}
.section-heading em { font-style: italic; color: var(--terracotta); }

/* ── game section base ── */
.play-intro { font-family: var(--serif); font-size: 17px; color: var(--muted); margin-bottom: 32px; }
.game-tabs {
  display: flex; gap: 2px; margin-bottom: 28px;
  border-bottom: 1px solid rgba(200,117,51,0.2);
  padding-bottom: 2px;
}
.game-tab {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
  padding: 8px 16px; border: 1px solid transparent; border-radius: 4px 4px 0 0;
  color: var(--muted); cursor: pointer; transition: all 0.18s;
  background: transparent;
}
.game-tab:hover { color: var(--terracotta); }
.game-tab.active {
  color: var(--terracotta); border-color: rgba(200,117,51,0.25);
  background: rgba(245,200,156,0.1); border-bottom-color: var(--cream);
}
.game-panel { display: none; }
.game-panel.active { display: block; }

/* ── shared game controls ── */
.game-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
}
.game-meta { display: flex; gap: 20px; font-size: 12px; color: var(--muted); }
.game-meta strong { color: var(--terracotta); }
.game-controls-top { display: flex; gap: 8px; flex-wrap: wrap; }
.game-btn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  padding: 6px 12px; border: 1px solid rgba(200,117,51,0.3);
  border-radius: 4px; color: var(--terracotta);
  background: rgba(245,200,156,0.08); cursor: pointer;
  transition: all 0.18s; text-transform: lowercase;
}
.game-btn:hover:not(:disabled) { background: rgba(245,200,156,0.22); border-color: var(--terracotta); }
.game-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.game-btn-sm {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
  padding: 4px 10px; border: 1px solid rgba(200,117,51,0.25);
  border-radius: 3px; color: var(--ember);
  background: rgba(245,200,156,0.06); cursor: pointer; transition: all 0.15s;
}
.game-btn-sm:hover { background: rgba(245,200,156,0.18); }
.game-hint { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; margin-top: 10px; }

/* ── canvas wrapper ── */
#snake-canvas, #life-canvas {
  display: block;
  max-width: 100%;
  border-radius: 6px;
  border: 1px solid rgba(200,117,51,0.2);
}

/* ── snake overlay ── */
.game-overlay {
  position: absolute; inset: 0;
  background: rgba(26,15,8,0.82);
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; backdrop-filter: blur(4px);
}
.game-canvas-wrap { position: relative; }
.game-overlay-content { text-align: center; }
.game-overlay-title { font-family: var(--serif); font-size: 28px; color: var(--peach); margin-bottom: 8px; }
.game-overlay-sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; letter-spacing: 0.08em; }

/* ── life presets ── */
.life-presets {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; flex-wrap: wrap;
}
.life-preset-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

/* ── type test ── */
.type-snippet-wrap {
  background: var(--terminal-bg); border: 1px solid rgba(200,117,51,0.2);
  border-radius: 6px 6px 0 0; padding: 20px; min-height: 120px;
  overflow-x: auto;
}
.type-snippet {
  font-family: var(--mono); font-size: 14px; line-height: 1.7;
  white-space: pre; color: var(--muted);
}
.type-snippet .t-correct { color: var(--terminal-fg); }
.type-snippet .t-wrong { background: #7a1c1c; color: var(--cream); border-radius: 2px; }
.type-snippet .t-cursor { border-bottom: 2px solid var(--terracotta); color: var(--peach); }
.type-input {
  width: 100%; background: rgba(26,15,8,0.6);
  border: 1px solid rgba(200,117,51,0.2); border-top: none;
  border-radius: 0 0 6px 6px; padding: 14px 20px;
  font-family: var(--mono); font-size: 14px; color: var(--terminal-fg);
  resize: none; outline: none; min-height: 56px;
  transition: border-color 0.18s;
}
.type-input:focus { border-color: rgba(200,117,51,0.5); }
.type-result {
  margin-top: 20px; padding: 24px;
  background: rgba(245,200,156,0.08); border: 1px solid rgba(200,117,51,0.2);
  border-radius: 6px; text-align: center;
}
.type-result.hidden { display: none; }
.type-result-title { font-family: var(--serif); font-size: 22px; color: var(--terracotta); margin-bottom: 10px; }
.type-result-stats { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

/* ── mobile d-pad ── */
.snake-dpad {
  display: none;
  justify-content: center; gap: 4px;
  flex-direction: column; align-items: center;
  margin-top: 12px;
}
.snake-dpad-row { display: flex; gap: 4px; }
.dpad-btn {
  width: 44px; height: 44px;
  background: rgba(200,117,51,0.15);
  border: 1px solid rgba(200,117,51,0.3);
  border-radius: 6px; font-size: 16px; color: var(--terracotta);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
@media (max-width: 640px) {
  .snake-dpad { display: flex; }
  #snake-canvas, #life-canvas { width: 100%; height: auto; }
  .game-tabs { overflow-x: auto; }
}
</style>

<!-- ══════════════════════════════════════════════
     JS — EXTRACT: everything inside this <script>
     ══════════════════════════════════════════════ -->
<script>
(function () {
'use strict';

/* ══════════════════════
   TAB SWITCHING
   ══════════════════════ */
const tabs = document.querySelectorAll('.game-tab');
const panels = document.querySelectorAll('.game-panel');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.tab;
    tabs.forEach(t => {
      t.classList.remove('active');
      t.setAttribute('aria-selected', 'false');
    });
    panels.forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    tab.setAttribute('aria-selected', 'true');
    const panel = document.getElementById('panel-' + target);
    if (panel) panel.classList.add('active');
  });
});


/* ══════════════════════════════════════════════════════
   GAME 1 — SNAKE PIPELINE
   ══════════════════════════════════════════════════════ */
(function SnakePipeline() {
  const canvas = document.getElementById('snake-canvas');
  const ctx    = canvas.getContext('2d');
  const COLS   = 30;
  const ROWS   = 18;
  const CELL   = 20; // 600/30 = 20, 360/18 = 20

  const scoreEl  = document.getElementById('snake-score');
  const lengthEl = document.getElementById('snake-length');
  const overlay  = document.getElementById('snake-overlay');
  const oTitle   = document.getElementById('snake-overlay-title');
  const oSub     = document.getElementById('snake-overlay-sub');
  const btnStart = document.getElementById('snake-start');
  const btnPause = document.getElementById('snake-pause');
  const btnRestart = document.getElementById('snake-restart');

  let snake, dir, nextDir, food, score, running, paused, tickTimer, tickSpeed;

  function initGame() {
    snake = [
      { x: 15, y: 9 },
      { x: 14, y: 9 },
      { x: 13, y: 9 },
    ];
    dir      = { x: 1, y: 0 };
    nextDir  = { x: 1, y: 0 };
    score    = 0;
    tickSpeed = 130;
    running  = false;
    paused   = false;
    spawnFood();
    updateHUD();
    drawFrame();
  }

  function spawnFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function updateHUD() {
    scoreEl.textContent  = score + ' MB/s';
    lengthEl.textContent = snake.length;
  }

  function startGame() {
    initGame();
    overlay.style.display = 'none';
    running = true;
    paused  = false;
    btnStart.disabled = true;
    btnPause.disabled = false;
    btnPause.textContent = 'pause()';
    scheduleTick();
  }

  function scheduleTick() {
    clearTimeout(tickTimer);
    if (running && !paused) {
      tickTimer = setTimeout(() => {
        tick();
        scheduleTick();
      }, tickSpeed);
    }
  }

  function tick() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      gameOver(); return;
    }
    // Self collision (skip last tail because it will move)
    for (let i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) { gameOver(); return; }
    }

    snake.unshift(head);

    // Food eaten
    if (head.x === food.x && head.y === food.y) {
      score += 5;
      // Speed up every 5 food (score increments by 5, so every 25 points = 5 food)
      if (score % 25 === 0) {
        tickSpeed = Math.max(60, tickSpeed - 8);
      }
      spawnFood();
    } else {
      snake.pop();
    }

    updateHUD();
    drawFrame();
  }

  function gameOver() {
    running = false;
    clearTimeout(tickTimer);
    oTitle.textContent = 'Pipeline crashed!';
    oSub.textContent   = 'Throughput: ' + score + ' MB/s';
    overlay.style.display = 'flex';
    btnStart.disabled = false;
    btnPause.disabled = true;
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    btnPause.textContent = paused ? 'resume()' : 'pause()';
    if (!paused) scheduleTick();
  }

  /* ── Drawing ── */
  function drawFrame() {
    // Background
    ctx.fillStyle = '#1a0f08';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = 'rgba(200,117,51,0.08)';
    ctx.lineWidth   = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
    }

    // Food — small terracotta circle with peach glow
    ctx.save();
    ctx.shadowColor  = '#f5c89c';
    ctx.shadowBlur   = 10;
    ctx.fillStyle    = '#c87533';
    ctx.beginPath();
    ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Snake
    const len = snake.length;
    snake.forEach((seg, i) => {
      const t = len > 1 ? i / (len - 1) : 0; // 0 = head, 1 = tail
      // Lerp from terracotta (#c87533) to ember (#8a3a1a)
      const r = Math.round(200 + (138 - 200) * t);
      const g = Math.round(117 + (58  - 117) * t);
      const b = Math.round(51  + (26  -  51) * t);
      ctx.fillStyle = `rgb(${r},${g},${b})`;

      const isHead  = i === 0;
      const inset   = isHead ? 1 : 2;
      const radius  = isHead ? 5 : 3;
      const x = seg.x * CELL + inset;
      const y = seg.y * CELL + inset;
      const w = CELL - inset * 2;
      const h = CELL - inset * 2;

      // Rounded rect
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, radius);
      ctx.fill();

      // Head highlight
      if (isHead) {
        ctx.fillStyle = 'rgba(245,200,156,0.25)';
        ctx.beginPath();
        ctx.roundRect(x + 2, y + 2, w - 4, 4, 2);
        ctx.fill();
      }
    });
  }

  /* ── Input ── */
  const KEY_MAP = {
    ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT',
    w: 'UP', s: 'DOWN', a: 'LEFT', d: 'RIGHT',
    W: 'UP', S: 'DOWN', A: 'LEFT', D: 'RIGHT',
  };
  const DIR_MAP = {
    UP:    { x:  0, y: -1 },
    DOWN:  { x:  0, y:  1 },
    LEFT:  { x: -1, y:  0 },
    RIGHT: { x:  1, y:  0 },
  };
  const OPPOSITE = { UP: 'DOWN', DOWN: 'UP', LEFT: 'RIGHT', RIGHT: 'LEFT' };

  document.addEventListener('keydown', e => {
    const d = KEY_MAP[e.key];
    if (!d) return;
    if (!running) return;
    const curDir = Object.keys(DIR_MAP).find(k => DIR_MAP[k].x === dir.x && DIR_MAP[k].y === dir.y);
    if (d !== OPPOSITE[curDir]) {
      nextDir = DIR_MAP[d];
    }
    e.preventDefault();
  });

  // D-pad buttons
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = btn.dataset.dir;
      if (!running) return;
      const curDir = Object.keys(DIR_MAP).find(k => DIR_MAP[k].x === dir.x && DIR_MAP[k].y === dir.y);
      if (d !== OPPOSITE[curDir]) nextDir = DIR_MAP[d];
    });
  });

  btnStart.addEventListener('click', startGame);
  btnRestart.addEventListener('click', startGame);
  btnPause.addEventListener('click', togglePause);

  // Initial draw
  initGame();
  overlay.style.display = 'flex';
  oTitle.textContent = 'pipeline.run()';
  oSub.textContent   = 'press run_pipeline() to start';
})();


/* ══════════════════════════════════════════════════════
   GAME 2 — CONWAY'S GAME OF LIFE
   ══════════════════════════════════════════════════════ */
(function ConwaysLife() {
  const canvas  = document.getElementById('life-canvas');
  const ctx     = canvas.getContext('2d');
  const COLS    = 50;  // 600/12
  const ROWS    = 30;  // 360/12
  const CELL    = 12;

  const genEl   = document.getElementById('life-gen');
  const cellsEl = document.getElementById('life-cells');
  const btnPlay  = document.getElementById('life-play');
  const btnStep  = document.getElementById('life-step');
  const btnClear = document.getElementById('life-clear');
  const btnRandom = document.getElementById('life-random');
  const btnSpeed = document.getElementById('life-speed');

  let grid, gen, running, intervalId;
  let fastMode = true; // true=100ms, false=350ms
  let isMouseDown = false;
  let lastToggled = null; // track last cell toggled during drag

  function makeGrid() {
    return Array.from({ length: ROWS }, () => new Uint8Array(COLS));
  }

  function initGrid() {
    grid = makeGrid();
    gen  = 0;
    updateHUD();
    drawFrame();
  }

  function randomize() {
    grid = makeGrid();
    gen  = 0;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        grid[r][c] = Math.random() < 0.22 ? 1 : 0;
      }
    }
    updateHUD();
    drawFrame();
  }

  function countLive() {
    let n = 0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) n += grid[r][c];
    return n;
  }

  function updateHUD() {
    genEl.textContent   = gen;
    cellsEl.textContent = countLive();
  }

  function step() {
    const next = makeGrid();
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        let neighbors = 0;
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = (r + dr + ROWS) % ROWS; // toroidal
            const nc = (c + dc + COLS) % COLS;
            neighbors += grid[nr][nc];
          }
        }
        const alive = grid[r][c];
        if (alive) {
          next[r][c] = (neighbors === 2 || neighbors === 3) ? 1 : 0;
        } else {
          next[r][c] = neighbors === 3 ? 1 : 0;
        }
      }
    }
    grid = next;
    gen++;
    updateHUD();
    drawFrame();
  }

  function togglePlay() {
    running = !running;
    if (running) {
      btnPlay.textContent = 'pause()';
      intervalId = setInterval(step, fastMode ? 100 : 350);
    } else {
      btnPlay.textContent = 'play()';
      clearInterval(intervalId);
    }
  }

  function stopPlay() {
    running = false;
    btnPlay.textContent = 'play()';
    clearInterval(intervalId);
  }

  btnPlay.addEventListener('click', togglePlay);
  btnStep.addEventListener('click', () => { stopPlay(); step(); });
  btnClear.addEventListener('click', () => { stopPlay(); initGrid(); });
  btnRandom.addEventListener('click', () => { stopPlay(); randomize(); });

  btnSpeed.addEventListener('click', () => {
    fastMode = !fastMode;
    btnSpeed.textContent = fastMode ? 'fast' : 'slow';
    if (running) {
      clearInterval(intervalId);
      intervalId = setInterval(step, fastMode ? 100 : 350);
    }
  });

  /* ── Drawing ── */
  function drawFrame() {
    // Background
    ctx.fillStyle = '#f7eee0';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = 'rgba(200,117,51,0.12)';
    ctx.lineWidth   = 0.5;
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, canvas.height); ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(canvas.width, r * CELL); ctx.stroke();
    }

    // Cells
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c]) {
          ctx.fillStyle = '#c87533';
          ctx.fillRect(c * CELL + 0.5, r * CELL + 0.5, CELL - 1, CELL - 1);
        }
      }
    }
  }

  /* ── Mouse interaction ── */
  function cellFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top)  * scaleY;
    const c = Math.floor(x / CELL);
    const r = Math.floor(y / CELL);
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return null;
    return { r, c };
  }

  canvas.addEventListener('mousedown', e => {
    isMouseDown = true;
    const cell = cellFromEvent(e);
    if (!cell) return;
    // Toggle: click toggles; drag paints (set to whatever we toggled to on mousedown)
    grid[cell.r][cell.c] = grid[cell.r][cell.c] ? 0 : 1;
    lastToggled = { r: cell.r, c: cell.c, val: grid[cell.r][cell.c] };
    updateHUD();
    drawFrame();
  });

  canvas.addEventListener('mousemove', e => {
    if (!isMouseDown) return;
    const cell = cellFromEvent(e);
    if (!cell) return;
    if (lastToggled && cell.r === lastToggled.r && cell.c === lastToggled.c) return;
    grid[cell.r][cell.c] = lastToggled ? lastToggled.val : 1;
    lastToggled = { r: cell.r, c: cell.c, val: grid[cell.r][cell.c] };
    updateHUD();
    drawFrame();
  });

  document.addEventListener('mouseup', () => { isMouseDown = false; lastToggled = null; });

  // Touch support for mobile painting
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const touch = e.touches[0];
    const cell = cellFromEvent(touch);
    if (!cell) return;
    grid[cell.r][cell.c] = grid[cell.r][cell.c] ? 0 : 1;
    lastToggled = { r: cell.r, c: cell.c, val: grid[cell.r][cell.c] };
    updateHUD(); drawFrame();
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const touch = e.touches[0];
    const cell = cellFromEvent(touch);
    if (!cell) return;
    if (lastToggled && cell.r === lastToggled.r && cell.c === lastToggled.c) return;
    grid[cell.r][cell.c] = lastToggled ? lastToggled.val : 1;
    lastToggled = { r: cell.r, c: cell.c, val: grid[cell.r][cell.c] };
    updateHUD(); drawFrame();
  }, { passive: false });

  canvas.addEventListener('touchend', () => { lastToggled = null; });

  /* ── Presets ── */
  // Centered placement helper
  function placePattern(pattern) {
    // pattern: array of [row, col] offsets from center
    stopPlay();
    const h = pattern.reduce((m, [r]) => Math.max(m, r), 0) + 1;
    const w = pattern.reduce((m, [, c]) => Math.max(m, c), 0) + 1;
    const originR = Math.floor((ROWS - h) / 2);
    const originC = Math.floor((COLS - w) / 2);
    grid = makeGrid();
    gen  = 0;
    pattern.forEach(([r, c]) => {
      const nr = originR + r;
      const nc = originC + c;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) grid[nr][nc] = 1;
    });
    updateHUD(); drawFrame();
  }

  const PRESETS = {
    glider: [
      [0,1],[1,2],[2,0],[2,1],[2,2]
    ],
    blinker: [
      [0,0],[0,1],[0,2]
    ],
    pulsar: (function() {
      // Standard 13x13 pulsar pattern
      const cells = [];
      // Pulsar is symmetric — define the top-left quadrant and mirror
      const top = [2,3,4,8,9,10];
      const rows = [0,5,7,12];
      // Horizontal bars
      rows.forEach(r => top.forEach(c => { cells.push([r, c]); cells.push([c, r]); }));
      return [...new Set(cells.map(([r,c]) => r+','+c))].map(s => s.split(',').map(Number));
    })(),
    gun: (function() {
      // Gosper Glider Gun (36 cols × 9 rows, offsets from top-left of pattern)
      const raw = [
        [0,24],
        [1,22],[1,24],
        [2,12],[2,13],[2,20],[2,21],[2,34],[2,35],
        [3,11],[3,15],[3,20],[3,21],[3,34],[3,35],
        [4,0],[4,1],[4,10],[4,16],[4,20],[4,21],
        [5,0],[5,1],[5,10],[5,14],[5,16],[5,17],[5,22],[5,24],
        [6,10],[6,16],[6,24],
        [7,11],[7,15],
        [8,12],[8,13]
      ];
      return raw;
    })()
  };

  document.querySelectorAll('[data-preset]').forEach(btn => {
    btn.addEventListener('click', () => {
      placePattern(PRESETS[btn.dataset.preset]);
    });
  });

  // Init
  initGrid();
})();


/* ══════════════════════════════════════════════════════
   GAME 3 — TYPING SPEED TEST
   ══════════════════════════════════════════════════════ */
(function TypingTest() {
  const snippetEl = document.getElementById('type-snippet');
  const inputEl   = document.getElementById('type-input');
  const wpmEl     = document.getElementById('type-wpm');
  const accEl     = document.getElementById('type-acc');
  const timerEl   = document.getElementById('type-timer');
  const resultEl  = document.getElementById('type-result');
  const statsEl   = document.getElementById('type-result-stats');
  const btnReset  = document.getElementById('type-reset');
  const btnNext   = document.getElementById('type-next');

  const SNIPPETS = [
    `df.groupby('station')\n  .agg({'passenger_count': 'sum', 'avg_wait': 'mean'})\n  .sort_values('passenger_count', ascending=False)\n  .reset_index()`,
    `producer = KafkaProducer(\n  bootstrap_servers=['localhost:9092'],\n  value_serializer=lambda v: json.dumps(v).encode('utf-8')\n)`,
    `CREATE TABLE passenger_flow (\n  station_id UInt32,\n  ts DateTime,\n  count UInt64,\n  line String\n) ENGINE = MergeTree()\nORDER BY (station_id, ts);`,
    `model = LGBMRegressor(\n  n_estimators=500,\n  learning_rate=0.05,\n  max_depth=6,\n  num_leaves=31\n)\nmodel.fit(X_train, y_train)`,
    `kubectl apply -f deployment.yaml\nkubectl rollout status deployment/naia\nkubectl get pods -n production`,
  ];

  let currentSnippet = '';
  let currentIndex   = 0;
  let typedChars     = 0;   // total chars typed (including wrong)
  let correctChars   = 0;   // chars that match snippet so far
  let startTime      = null;
  let timerInterval  = null;
  let timeLeft       = 60;
  let finished       = false;
  let usedIndices    = [];

  function pickSnippet() {
    if (usedIndices.length >= SNIPPETS.length) usedIndices = [];
    let idx;
    do { idx = Math.floor(Math.random() * SNIPPETS.length); } while (usedIndices.includes(idx));
    usedIndices.push(idx);
    return idx;
  }

  function initTest() {
    clearInterval(timerInterval);
    currentIndex   = pickSnippet();
    currentSnippet = SNIPPETS[currentIndex];
    typedChars     = 0;
    correctChars   = 0;
    startTime      = null;
    timeLeft       = 60;
    finished       = false;

    inputEl.value = '';
    inputEl.disabled = false;
    resultEl.classList.add('hidden');
    wpmEl.textContent   = '0';
    accEl.textContent   = '100%';
    timerEl.textContent = '60s';

    renderSnippet('');
  }

  function renderSnippet(typed) {
    const chars = currentSnippet.split('');
    let html = '';
    for (let i = 0; i < chars.length; i++) {
      const ch = chars[i];
      const display = ch === '\n' ? '↵\n' : ch === ' ' ? ' ' : ch;
      if (i < typed.length) {
        if (typed[i] === ch) {
          html += `<span class="t-correct">${escHtml(display)}</span>`;
        } else {
          // Wrong — show expected char with wrong styling
          html += `<span class="t-wrong">${escHtml(display)}</span>`;
        }
      } else if (i === typed.length) {
        html += `<span class="t-cursor">${escHtml(display)}</span>`;
      } else {
        html += `<span>${escHtml(display)}</span>`;
      }
    }
    // If typed more than snippet, ignore extras
    snippetEl.innerHTML = html;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function calcWPM() {
    if (!startTime) return 0;
    const elapsed = (Date.now() - startTime) / 60000; // in minutes
    if (elapsed <= 0) return 0;
    return Math.round((correctChars / 5) / elapsed);
  }

  function calcAccuracy(totalTyped, correct) {
    if (totalTyped === 0) return 100;
    return Math.round((correct / totalTyped) * 100);
  }

  function startTimer() {
    startTime = Date.now();
    timerInterval = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft + 's';
      if (timeLeft <= 0) finishTest();
    }, 1000);
  }

  function finishTest() {
    if (finished) return;
    finished = true;
    clearInterval(timerInterval);
    inputEl.disabled = true;

    const wpm = calcWPM();
    const acc = calcAccuracy(typedChars, correctChars);

    wpmEl.textContent = wpm;
    accEl.textContent = acc + '%';
    statsEl.textContent = `${wpm} wpm · ${acc}% accuracy · ${correctChars} correct chars`;
    resultEl.classList.remove('hidden');
  }

  inputEl.addEventListener('input', () => {
    if (finished) return;
    const typed = inputEl.value;

    // Start timer on first keystroke
    if (!startTime && typed.length > 0) startTimer();

    typedChars   = typed.length;
    correctChars = 0;
    for (let i = 0; i < Math.min(typed.length, currentSnippet.length); i++) {
      if (typed[i] === currentSnippet[i]) correctChars++;
    }

    renderSnippet(typed);

    // Update live stats
    wpmEl.textContent = calcWPM();
    accEl.textContent = calcAccuracy(typedChars, correctChars) + '%';

    // Check completion
    if (typed === currentSnippet) finishTest();
  });

  // Prevent tab from defocusing textarea
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Tab') e.preventDefault();
  });

  btnReset.addEventListener('click', initTest);
  btnNext.addEventListener('click', initTest);

  // Init on load
  initTest();
})();

})(); // end IIFE
</script>
