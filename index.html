<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NWSH</title>
<meta name="description" content="Portfolio of Nathan Wong Shih Hao — Computer Scientist, Data Scientist & Data Engineer at HKUST." />

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<canvas id="particles" aria-hidden="true"></canvas>
<div id="cursorGlow" aria-hidden="true"></div>
<div id="scrollBar" aria-hidden="true"></div>

<!-- sections loaded dynamically from sections/ folder -->
<div id="sections-container"></div>

<!-- section loader — runs before main.js so all DOM elements exist -->
<script>
(function() {
  'use strict';

  const SECTIONS = [
    '01-nav',
    '02-hero',
    '03-ticker',
    '04-about',
    '05-skills',
    '06-projects',
    '07-experience',
    '08-fyp',
    '09-gallery',
    '10-play',
    '11-contact',
    '12-footer',
  ];

  const container = document.getElementById('sections-container');

  // Load sections sequentially to preserve DOM order
  function loadNext(index) {
    if (index >= SECTIONS.length) {
      // All sections loaded — dispatch event so main.js can proceed
      document.dispatchEvent(new CustomEvent('sections-loaded'));
      return;
    }

    const name = SECTIONS[index];
    fetch('sections/' + name + '.html')
      .then(function(res) {
        if (!res.ok) throw new Error('Failed to load sections/' + name + '.html');
        return res.text();
      })
      .then(function(html) {
        // Insert the fetched HTML into the container
        container.insertAdjacentHTML('beforeend', html);
        loadNext(index + 1);
      })
      .catch(function(err) {
        console.error(err);
        loadNext(index + 1); // skip failed section and continue
      });
  }

  loadNext(0);
})();
</script>

<script src="assets/js/main.js"></script>
</body>
</html>
